<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Scan QR Code</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="mobile-body">
  <nav class="mobile-nav">
    <div class="mobile-nav-title">Scan Equipment</div>
  </nav>

  <div class="mobile-container">
    <div class="mobile-fullscreen-card">
      <div class="fullscreen-icon" style="font-size:4rem;">📷</div>
      <h2>Scan QR Code</h2>
      <p class="muted" style="margin-bottom:1.5rem;">Use your phone's camera to scan the QR code on the equipment.</p>
      <div class="permission-features">
        <div class="perm-item"><span class="perm-icon">1️⃣</span><span>Open your <strong>phone camera</strong></span></div>
        <div class="perm-item"><span class="perm-icon">2️⃣</span><span>Point at the <strong>QR code</strong> on the equipment</span></div>
        <div class="perm-item"><span class="perm-icon">3️⃣</span><span>Tap the <strong>link</strong> that appears</span></div>
        <div class="perm-item"><span class="perm-icon">4️⃣</span><span>Enter your <strong>Employee ID</strong> and fill the form</span></div>
      </div>
      <p class="muted small" style="margin-top:1.5rem;">💡 No app needed — just your phone's built-in camera.</p>
    </div>
  </div>

</body>
</html>
