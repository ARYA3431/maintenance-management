<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>My Tasks - Maintenance Management</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="mobile-body">
  <nav class="mobile-nav">
    <a href="/dashboard.html" class="mobile-nav-back">‹</a>
    <div class="mobile-nav-title">My Tasks</div>
    <a href="#" class="mobile-nav-action" onclick="showNotifications()">🔔
      <span id="notifBadge" class="notif-badge-small" style="display:none;">0</span>
    </a>
  </nav>

  <div class="mobile-container" style="padding-bottom:2rem;">

    <!-- Employee ID Verification -->
    <div id="authStep" style="display:block;">
      <div class="mobile-fullscreen-card">
        <div class="fullscreen-icon">🪪</div>
        <h2>Enter Employee ID</h2>
        <p class="muted">Verify your identity to view your tasks.</p>
        <div style="margin:1.5rem 0;">
          <input type="text" id="employeeIdInput" class="mobile-input" inputmode="numeric" pattern="[0-9]*"
            placeholder="e.g. 1016229" autocomplete="off" style="text-align:center;font-size:1.3rem;letter-spacing:2px;">
        </div>
        <button class="mobile-btn mobile-btn-primary mobile-btn-full" id="verifyBtn" onclick="verifyEmployee()">
          Verify &amp; View Tasks
        </button>
        <p id="authError" class="muted small" style="color:#dc2626;margin-top:0.75rem;display:none;"></p>
      </div>
    </div>

    <!-- Tasks Content -->
    <div id="tasksContent" style="display:none;">

      <!-- Weekly Stats -->
      <div class="tasks-stats-bar">
        <div class="tasks-stat">
          <span class="tasks-stat-num" id="statWeekCompleted">0</span>
          <span class="tasks-stat-label">Done this week</span>
        </div>
        <div class="tasks-stat-divider"></div>
        <div class="tasks-stat">
          <span class="tasks-stat-num" id="statWeekTotal">0</span>
          <span class="tasks-stat-label">Total this week</span>
        </div>
        <div class="tasks-stat-divider"></div>
        <div class="tasks-stat">
          <span class="tasks-stat-num tasks-stat-danger" id="statOverdue">0</span>
          <span class="tasks-stat-label">Overdue</span>
        </div>
      </div>

      <!-- Overdue Section -->
      <div id="overdueSection" style="display:none;">
        <div class="tasks-section-header tasks-section-danger">
          <span>🚨 Overdue</span>
          <span class="tasks-count" id="overdueCount">0</span>
        </div>
        <div id="overdueList" class="tasks-list"></div>
      </div>

      <!-- Due Today Section -->
      <div id="dueTodaySection" style="display:none;">
        <div class="tasks-section-header tasks-section-primary">
          <span>📋 Due Today</span>
          <span class="tasks-count" id="dueTodayCount">0</span>
        </div>
        <div id="dueTodayList" class="tasks-list"></div>
      </div>

      <!-- Upcoming Section -->
      <div id="upcomingSection" style="display:none;">
        <div class="tasks-section-header tasks-section-muted">
          <span>🔮 Upcoming</span>
          <span class="tasks-count" id="upcomingCount">0</span>
        </div>
        <div id="upcomingList" class="tasks-list"></div>
      </div>

      <!-- No Tasks -->
      <div id="noTasks" style="display:none;">
        <div class="mobile-fullscreen-card" style="min-height:auto;padding:3rem 2rem;">
          <div class="fullscreen-icon">✅</div>
          <h2>All Caught Up!</h2>
          <p class="muted">No pending tasks right now. Great work!</p>
        </div>
      </div>

      <!-- Notifications Panel -->
      <div id="notifPanel" style="display:none;">
        <div class="tasks-section-header tasks-section-primary" style="margin-top:1rem;">
          <span>🔔 Notifications</span>
          <button class="mobile-btn mobile-btn-ghost" style="padding:4px 8px;min-height:auto;font-size:0.8rem;" onclick="hideNotifications()">Close</button>
        </div>
        <div id="notifList" class="tasks-list"></div>
      </div>

    </div>
  </div>

  <script>
    let employeeVerified = false;

    document.getElementById('employeeIdInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); verifyEmployee(); }
    });

    async function verifyEmployee() {
      const empId = document.getElementById('employeeIdInput').value.trim();
      const errorEl = document.getElementById('authError');
      errorEl.style.display = 'none';
      if (!empId) { errorEl.textContent = 'Please enter your Employee ID.'; errorEl.style.display = 'block'; return; }

      const btn = document.getElementById('verifyBtn');
      btn.disabled = true; btn.textContent = 'Verifying...';

      try {
        const res = await fetch('/api/verify-employee', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ employee_id: empId })
        });
        const data = await res.json();
        if (!res.ok) {
          errorEl.textContent = data.error || 'Employee ID not found.';
          errorEl.style.display = 'block';
          btn.disabled = false; btn.textContent = 'Verify & View Tasks';
          return;
        }
        employeeVerified = true;
        document.getElementById('authStep').style.display = 'none';
        document.getElementById('tasksContent').style.display = 'block';
        loadTasks();
        loadNotifications();
      } catch {
        errorEl.textContent = 'Connection error. Please try again.';
        errorEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Verify & View Tasks';
      }
    }

    async function loadTasks() {
      try {
        const res = await fetch('/api/schedules/my-tasks');
        if (!res.ok) return;
        const data = await res.json();

        document.getElementById('statWeekCompleted').textContent = data.week_completed || 0;
        document.getElementById('statWeekTotal').textContent = data.week_total || 0;
        document.getElementById('statOverdue').textContent = data.overdue.length;

        const hasAny = data.overdue.length > 0 || data.due_today.length > 0 || data.upcoming.length > 0;

        if (data.overdue.length > 0) {
          document.getElementById('overdueSection').style.display = 'block';
          document.getElementById('overdueCount').textContent = data.overdue.length;
          document.getElementById('overdueList').innerHTML = data.overdue.map(t => taskCard(t, 'overdue')).join('');
        } else {
          document.getElementById('overdueSection').style.display = 'none';
        }

        if (data.due_today.length > 0) {
          document.getElementById('dueTodaySection').style.display = 'block';
          document.getElementById('dueTodayCount').textContent = data.due_today.length;
          document.getElementById('dueTodayList').innerHTML = data.due_today.map(t => taskCard(t, 'today')).join('');
        } else {
          document.getElementById('dueTodaySection').style.display = 'none';
        }

        if (data.upcoming.length > 0) {
          document.getElementById('upcomingSection').style.display = 'block';
          document.getElementById('upcomingCount').textContent = data.upcoming.length;
          document.getElementById('upcomingList').innerHTML = data.upcoming.map(t => taskCard(t, 'upcoming')).join('');
        } else {
          document.getElementById('upcomingSection').style.display = 'none';
        }

        document.getElementById('noTasks').style.display = hasAny ? 'none' : 'block';
      } catch (e) { console.error('Failed to load tasks:', e); }
    }

    function taskCard(task, type) {
      const dueLabel = type === 'overdue' ? `Overdue since ${formatDate(task.due_date)}`
        : type === 'today' ? 'Due today'
        : `Due ${formatDate(task.due_date)}`;

      const urgencyClass = type === 'overdue' ? 'task-card-danger'
        : type === 'today' ? 'task-card-primary' : 'task-card-muted';

      const scanUrl = `/scan/${escapeAttr(task.qr_token)}`;
      const taskTypeIcon = (task.task_type || 'inspection') === 'maintenance' ? '🔧' : '🔍';
      const taskTypeLabel = (task.task_type || 'inspection') === 'maintenance' ? 'Maintenance' : 'Inspection';

      return `
        <div class="task-card ${urgencyClass}">
          <div class="task-card-top">
            <div class="task-card-info">
              <h4>${escapeHtml(task.equipment_name)}</h4>
              <p class="muted small">📍 ${escapeHtml(task.location_name)}</p>
              <p class="muted small">${taskTypeIcon} ${taskTypeLabel} · 🔄 ${escapeHtml(task.frequency)}</p>
            </div>
            <span class="task-due-label ${type === 'overdue' ? 'due-danger' : type === 'today' ? 'due-primary' : 'due-muted'}">${dueLabel}</span>
          </div>
          <div class="task-card-actions">
            <a href="${scanUrl}" class="mobile-btn mobile-btn-primary" style="font-size:0.85rem;padding:10px 16px;min-height:auto;">
              ${taskTypeIcon} Start ${taskTypeLabel}
            </a>
          </div>
        </div>
      `;
    }

    async function loadNotifications() {
      try {
        const res = await fetch('/api/schedules/my-notifications');
        if (!res.ok) return;
        const notifs = await res.json();
        const unread = notifs.filter(n => !n.is_read).length;

        const badge = document.getElementById('notifBadge');
        if (unread > 0) {
          badge.textContent = unread;
          badge.style.display = 'inline-block';
        } else {
          badge.style.display = 'none';
        }

        document.getElementById('notifList').innerHTML = notifs.length === 0
          ? '<p class="muted" style="padding:1rem;text-align:center;">No notifications yet.</p>'
          : notifs.map(n => `
            <div class="task-card ${n.is_read ? 'task-card-muted' : 'task-card-primary'}" style="cursor:pointer;" onclick="markNotifRead('${n.id}', this)">
              <p style="font-size:0.9rem;">${escapeHtml(n.message)}</p>
              <p class="muted small" style="margin-top:4px;">${formatDateTime(n.created_at)}</p>
            </div>
          `).join('');
      } catch (e) { console.error('Failed to load notifications:', e); }
    }

    async function markNotifRead(id, el) {
      try {
        await fetch(`/api/schedules/my-notifications/${encodeURIComponent(id)}/read`, { method: 'PUT' });
        el.classList.remove('task-card-primary');
        el.classList.add('task-card-muted');
        loadNotifications();
      } catch (e) {}
    }

    function showNotifications() {
      document.getElementById('notifPanel').style.display = 'block';
      document.getElementById('notifPanel').scrollIntoView({ behavior: 'smooth' });
    }
    function hideNotifications() {
      document.getElementById('notifPanel').style.display = 'none';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      const d = new Date(dateStr + 'T00:00:00+05:30');
      return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', timeZone: 'Asia/Kolkata' });
    }

    function formatDateTime(dateStr) {
      if (!dateStr) return '—';
      const d = new Date(dateStr.replace(' ', 'T') + '+05:30');
      return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', timeZone: 'Asia/Kolkata' }) +
        ' ' + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true, timeZone: 'Asia/Kolkata' });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }
    function escapeAttr(str) {
      return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Auto-refresh every 5 minutes
    setInterval(() => { if (employeeVerified) { loadTasks(); loadNotifications(); } }, 5 * 60 * 1000);
  </script>
</body>
</html>
