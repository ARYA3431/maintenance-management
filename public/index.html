<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance Management System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <span class="login-icon">🔧</span>
        <h1>Maintenance Management</h1>
        <p>Sign in to your account</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">👤 Username</label>
          <input type="text" id="username" name="username" required autocomplete="username" placeholder="Enter your username">
        </div>
        <div class="form-group">
          <label for="password">🔒 Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
          ➜ Sign In
        </button>
        <div id="loginError" class="error-message" style="display:none;"></div>
      </form>
      <div class="login-footer">
        <p style="margin-bottom:0.5rem;"><strong>Admin Login</strong></p>
        <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
          <span class="tag tag-normal" style="cursor:pointer;padding:0.3rem 0.7rem;" onclick="fillDemo('admin','admin123')">👤 Demo Admin</span>
        </div>
        <p class="muted" style="margin-top:0.75rem;font-size:0.85rem;">Engineers: Scan the QR code directly — no login needed.</p>
      </div>
    </div>
  </div>

  <script>
    function fillDemo(user, pass) {
      document.getElementById('username').value = user;
      document.getElementById('password').value = pass;
    }
    // Check if already logged in
    fetch('/api/auth/me').then(r => {
      if (!r.ok) return;
      return r.json().then(user => {
        if (user.role === 'admin') window.location.href = '/admin.html';
      });
    }).catch(() => {});

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      errorEl.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) {
          errorEl.textContent = data.error;
          errorEl.style.display = 'block';
          return;
        }
        const params = new URLSearchParams(window.location.search);
        const returnTo = params.get('returnTo');
        if (returnTo && returnTo.startsWith('/')) {
          window.location.href = returnTo;
        } else {
          window.location.href = '/admin.html';
        }
      } catch (err) {
        errorEl.textContent = 'Connection error. Please try again.';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
